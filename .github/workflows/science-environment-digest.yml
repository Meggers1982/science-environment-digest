name: Science & Environment Research Digest

on:
  # Runs every morning at 6:00 AM Central during daylight saving time (11:00 UTC)
  schedule:
    - cron: '0 11 * * *'

  # Manual trigger — optionally override a single category+chunk
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to run (leave blank for all)'
        required: false
        default: ''
      chunk_index:
        description: 'Chunk index to run (1-based, leave blank for all)'
        required: false
        default: ''

jobs:
  # ── Matrix jobs: one per category/chunk ─────────────────────────────────
  digest:
    name: "${{ matrix.category }} ${{ matrix.chunk_total > 1 && format('({0}/{1})', matrix.chunk_index, matrix.chunk_total) || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Environmental Health (93 journals → 1 chunk) ─────────────────
          - category: Environmental Health
            chunk_index: "1"
            chunk_total: 1

          # ── Public Health & Epidemiology (148 journals → 2 chunks) ───────
          - category: Public Health & Epidemiology
            chunk_index: "1"
            chunk_total: 2
          - category: Public Health & Epidemiology
            chunk_index: "2"
            chunk_total: 2

          # ── Genetics & Molecular Biology (273 journals → 3 chunks) ───────
          - category: Genetics & Molecular Biology
            chunk_index: "1"
            chunk_total: 3
          - category: Genetics & Molecular Biology
            chunk_index: "2"
            chunk_total: 3
          - category: Genetics & Molecular Biology
            chunk_index: "3"
            chunk_total: 3

          # ── Infectious Disease (221 journals → 2 chunks) ─────────────────
          - category: Infectious Disease
            chunk_index: "1"
            chunk_total: 2
          - category: Infectious Disease
            chunk_index: "2"
            chunk_total: 2

          # ── Pharmacology & Drug Therapy (174 journals → 2 chunks) ────────
          - category: Pharmacology & Drug Therapy
            chunk_index: "1"
            chunk_total: 2
          - category: Pharmacology & Drug Therapy
            chunk_index: "2"
            chunk_total: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:       ${{ secrets.SERPAPI_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL:   meagan.lea.morris@gmail.com
          CATEGORIES:        ${{ matrix.category }}
          CHUNK_INDEX:       ${{ matrix.chunk_index }}
          CHUNK_TOTAL:       ${{ matrix.chunk_total }}
          TOPIC_FOCUS:       ""
          FILTER_CATEGORY:   ${{ github.event.inputs.category }}
          DASHBOARD_URL:     ${{ vars.DASHBOARD_URL }}
        run: python scripts/science_environment_digest.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: se-results-${{ matrix.category }}-${{ matrix.chunk_index }}
          path: /tmp/results.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Deploy job: merge all artifacts → data/results.json → GitHub Pages ──
  deploy:
    name: "Merge & deploy dashboard"
    runs-on: ubuntu-latest
    needs: digest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: se-results-*
          path: /tmp/artifacts

      - name: List downloaded artifacts
        run: find /tmp/artifacts -name "*.json" | sort

      - name: Merge results and send digest email
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: meagan.lea.morris@gmail.com
          DASHBOARD_URL:   ${{ vars.DASHBOARD_URL }}
        run: python scripts/merge_results.py

      - name: Commit and push updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update research digest results [skip ci]"
            git push
          fi

      - name: Publish results to shared dashboard
        env:
          DASHBOARD_REPO_TOKEN: ${{ secrets.DASHBOARD_REPO_TOKEN }}
          DASHBOARD_REPO: Meggers1982/research-digest-dashboard
          DASHBOARD_FILE: data/science-environment.json
          SOURCE_ID: science-environment
          SOURCE_LABEL: Science & Environment
        run: |
          git clone "https://x-access-token:${DASHBOARD_REPO_TOKEN}@github.com/${DASHBOARD_REPO}.git" /tmp/research-digest-dashboard
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          source = json.loads(Path("data/results.json").read_text())
          if isinstance(source, list):
              source = {"last_updated": "", "total_studies": len(source), "studies": source}

          _ANIMAL_TAGS = ("animal only", "animal or cell study", "rodent model only")
          source["studies"] = [
              s for s in source.get("studies", [])
              if not any(tag in s.get("caveats", "").lower() for tag in _ANIMAL_TAGS)
          ]

          source["source_id"] = os.environ["SOURCE_ID"]
          source["source_label"] = os.environ["SOURCE_LABEL"]
          source["total_studies"] = len(source.get("studies", []))

          out = Path("/tmp/research-digest-dashboard") / os.environ["DASHBOARD_FILE"]
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(source, indent=2) + "\n")
          PY
          cd /tmp/research-digest-dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DASHBOARD_FILE"
          if git diff --cached --quiet; then
            echo "No dashboard changes"
          else
            git commit -m "Update ${SOURCE_LABEL} digest results"
            pushed=false
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=true
                break
              fi
              sleep $((attempt * 5))
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to publish dashboard update"
              exit 1
            fi
          fi
